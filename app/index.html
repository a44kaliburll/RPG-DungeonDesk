<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG Dungeon Desk</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ============ TOP BAR ============ -->
<header id="topbar">
  <div class="brand" id="brand-home" title="Home">
    <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 2 3 7v10l9 5 9-5V7l-9-5zm0 2.2 6.5 3.6L12 11.4 5.5 7.8 12 4.2zM5 9.6l6 3.3v6.5l-6-3.3V9.6zm14 0v6.5l-6 3.3v-6.5l6-3.3z"/></svg>
    <span>RPG Dungeon Desk</span>
  </div>
  <div class="topbar-center">
    <input id="project-name" class="project-name" value="Untitled World" spellcheck="false" title="Project name">
    <span id="save-status" class="save-status"></span>
  </div>
  <div class="topbar-actions">
    <button class="btn ghost" id="btn-new-project" title="New project (Ctrl+N)">New</button>
    <button class="btn ghost" id="btn-open-project" title="Open project (Ctrl+O)">Open</button>
    <button class="btn primary" id="btn-save-project" title="Save project (Ctrl+S)">Save</button>
  </div>
</header>

<!-- ============ HOME SCREEN ============ -->
<main id="screen-home" class="screen">
  <div class="home-wrap">
    <section class="home-section">
      <div class="home-section-head">
        <h2>Maps</h2>
        <button class="btn primary" id="btn-new-map">+ New Map</button>
      </div>
      <div id="map-grid" class="map-grid"></div>
    </section>
    <section class="home-section">
      <div class="home-section-head">
        <h2>World Codex</h2>
        <button class="btn" id="btn-open-codex">Open Codex</button>
      </div>
      <div id="codex-summary" class="codex-summary"></div>
    </section>
  </div>
</main>

<!-- ============ EDITOR SCREEN ============ -->
<main id="screen-editor" class="screen hidden">
  <div class="editor-toolbar">
    <button class="btn ghost" id="btn-editor-back" title="Back to home">← Home</button>
    <span class="map-title-wrap">
      <span id="editor-map-type" class="map-type-badge"></span>
      <input id="editor-map-name" class="map-name-input" spellcheck="false">
    </span>
    <span class="toolbar-spacer"></span>
    <button class="icon-btn" id="btn-undo" title="Undo (Ctrl+Z)">↶</button>
    <button class="icon-btn" id="btn-redo" title="Redo (Ctrl+Y)">↷</button>
    <span class="toolbar-sep"></span>
    <button class="icon-btn" id="btn-zoom-out" title="Zoom out">−</button>
    <span id="zoom-label" class="zoom-label">100%</span>
    <button class="icon-btn" id="btn-zoom-in" title="Zoom in">+</button>
    <button class="icon-btn" id="btn-zoom-fit" title="Fit map to window">⛶</button>
    <span class="toolbar-sep"></span>
    <button class="icon-btn" id="btn-toggle-grid" title="Toggle grid">▦</button>
    <span class="toolbar-sep"></span>
    <button class="btn ghost" id="btn-generate-map" title="Randomly generate this map's contents">🎲 Generate</button>
    <button class="btn ghost" id="btn-export-png" title="Export map as PNG (Ctrl+E)">Export PNG</button>
  </div>

  <div class="editor-body">
    <!-- Left: tools -->
    <aside class="tool-rail" id="tool-rail"></aside>

    <!-- Left context panel -->
    <aside class="context-panel" id="context-panel"></aside>

    <!-- Canvas -->
    <div class="canvas-host" id="canvas-host">
      <canvas id="map-canvas"></canvas>
      <div id="canvas-hint" class="canvas-hint"></div>
    </div>

    <!-- Right: inspector -->
    <aside class="inspector" id="inspector"></aside>
  </div>
</main>

<!-- ============ CODEX SCREEN ============ -->
<main id="screen-codex" class="screen hidden">
  <div class="codex-body">
    <aside class="codex-sidebar">
      <button class="btn ghost codex-back" id="btn-codex-back">← Home</button>
      <input id="codex-search" class="codex-search" placeholder="Search entries…" spellcheck="false">
      <div id="codex-cats" class="codex-cats"></div>
      <button class="btn primary codex-new" id="btn-new-entry">+ New Entry</button>
      <button class="btn ghost codex-new" id="btn-random-entry" title="Roll a random entry for the selected category">🎲 Random Entry</button>
      <button class="btn ghost codex-export" id="btn-export-codex" title="Export all entries as a shareable HTML file">Export HTML</button>
    </aside>
    <div class="codex-list-pane">
      <div id="codex-list" class="codex-list"></div>
    </div>
    <div class="codex-editor-pane" id="codex-editor-pane">
      <div class="codex-empty" id="codex-empty">
        <p>Select an entry, or create a new one.</p>
        <p class="dim">Use <code>[[Entry Name]]</code> inside any text to cross-link entries.</p>
      </div>
      <div class="codex-editor hidden" id="codex-editor"></div>
    </div>
  </div>
</main>

<!-- ============ MODAL ============ -->
<div id="modal-backdrop" class="modal-backdrop hidden">
  <div class="modal" id="modal"></div>
</div>

<!-- ============ TOAST ============ -->
<div id="toast" class="toast hidden"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
